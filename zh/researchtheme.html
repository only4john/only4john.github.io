  b.className='yr-btn';
  b.textContent=y;
  b.onclick=()=>{activeYear=y;allBtn.classList.remove('active');b.classList.add('active');render();};
  yf.appendChild(b);
}

const cf=document.getElementById('catFilters');
for(const cat of cats.sort()){
  const b=document.createElement('span');
  b.className='cat-chip '+getCatClass(cat);
  b.textContent=cat+' ('+(catCount[cat]||0)+')';
  b.onclick=()=>{if(activeCats.has(cat)){activeCats.delete(cat);b.classList.remove('active');}else{activeCats.add(cat);b.classList.add('active');}render();};
  cf.appendChild(b);
}

document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.onclick=()=>{currentView=btn.dataset.view;document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();};
});

document.getElementById('search').addEventListener('input',render);

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const main=document.getElementById('main');
  main.innerHTML='';
  let visible=0;
  let currentY=0;
  const filtered=DB.filter(p=>{
    const[year,title,authors,journal,cats]=p;
    if(activeYear&&year!==activeYear)return false;
    if(activeCats.size>0&&!p[4].some(c=>activeCats.has(c)))return false;
    if(q&&!title.toLowerCase().includes(q)&&!authors.toLowerCase().includes(q)&&!journal.toLowerCase().includes(q))return false;
    return true;
  });
  for(const p of filtered){
    const[year,title,authors,journal,cats_list,cats_doi,cats_blog]=p;
    if(year!==currentY){currentY=year;
      const yrDiv=document.createElement('div');
      yrDiv.className='timeline-year';
      yrDiv.innerHTML='<span class="yr-dot"></span>'+year;
      const grid=document.createElement('div');
      grid.className='pub-grid'+(currentView==='list'?' list-view':'');
      yrDiv.appendChild(grid);
      main.appendChild(yrDiv);
    }
    const lastGrid=main.querySelector('.pub-grid:last-child');
    const card=document.createElement('div');
    card.className='pub-card';
    const primaryCat=cats_list[0];
    const color=CAT_COLORS[primaryCat]||'#6c8aff';
    card.innerHTML='<div class="pub-type-bar" style="background:'+color+'"></div>'+
      '<div class="pub-authors">'+esc(authors).replace(/\*([^*,\uff0c\u3001]+)/g,'<span class="\u901a\u8baf">$1</span>')+'</div>'+
      '<div class="pub-title">'+esc(title)+'</div>'+
      '<div class="pub-meta">'+cats_list.map(c=>'<span class="pub-tag cat-'+esc(c)+'">'+esc(c)+'</span>').join('')+'</div>'+
      '<div class="pub-journal">'+esc(journal)+'</div>'+
      '<div class="pub-links">'+
        (cats_doi?'<a class="pub-link doi" href="https://doi.org/'+esc(cats_doi)+'" target="_blank">DOI</a>':'')+
        (cats_blog?'<a class="pub-link blog" href="https://'+esc(cats_blog)+'" target="_blank">\u7814\u7a76\u6f2b\u8c08</a>':'')+
      '</div>';
    lastGrid.appendChild(card);
    visible++;
  }
  document.getElementById('total-count').innerHTML=visible===DB.length?'\u663e\u793a\u5168\u90e8':'<strong>'+visible+'</strong> / '+DB.length;
  if(visible===0){
    const nr=document.createElement('div');
    nr.className='no-results visible';
    nr.innerHTML='<div class="emoji">\ud83d\udd0d</div><div>\u6ca1\u6709\u627e\u5230\u5339\u914d\u7684\u8bba\u6587</div>';
    main.appendChild(nr);
  }
}
render();
</script>
</body>
</html>
