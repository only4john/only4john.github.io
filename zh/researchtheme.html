<title>📚 费老师组（UrbanPlayground）论文选集 (2017-2026)</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card-hover:#21253a;--border:#2a2d3e;--text:#e2e4ef;--text-muted:#8b8fa8;--accent:#6c8aff;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{padding:48px 24px 32px;text-align:center;background:linear-gradient(180deg,#13162a 0%,var(--bg) 100%)}
header h1{font-size:2rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#6c8aff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text-muted);font-size:0.95rem;max-width:640px;margin:0 auto}
.stats-bar{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:0.8rem;color:var(--text-muted)}
.stat-pill strong{color:var(--accent)}
.controls{max-width:1100px;margin:0 auto;padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px 10px 40px;color:var(--text);font-size:0.9rem;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:"📖";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1.1rem}
.year-filter{display:flex;gap:6px;flex-wrap:wrap}
.yr-btn{background:var(--card);border:1px solid var(--border);color:var(--text-muted);padding:8px 14px;border-radius:20px;cursor:pointer;font-size:0.82rem;transition:all .2s}
.yr-btn:hover{border-color:var(--accent);color:var(--text)}
.yr-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-filters{max-width:1100px;margin:0 auto;padding:0 24px 16px;display:flex;gap:8px;flex-wrap:wrap}
.cat-城市声环境{--cat-color:#00bcd4}.cat-情绪地理{--cat-color:#ff9800}.cat-生态遥感{--cat-color:#4caf50}
.cat-健康地理{--cat-color:#f44336}.cat-空间大数据{--cat-color:#2196f3}.cat-城市遥感{--cat-color:#9c27b0}
.cat-复杂网络{--cat-color:#795548}.cat-教学论文{--cat-color:#9e9e9e}.cat-光伏产能{--cat-color:#ffeb3b}
.cat-水文地貌{--cat-color:#009688}.cat-艺术史{--cat-color:#e91e63}.cat-聚类方法{--cat-color:#3f51b5}
.cat-听觉显示{--cat-color:#8bc34a}.cat-现实增强{--cat-color:#ff5722}.cat-生物物理建模{--cat-color:#0097a7}
.cat-其他{--cat-color:#607d8b}
.cat-chip{padding:5px 12px;border-radius:16px;font-size:0.78rem;cursor:pointer;border:1px solid;transition:all .2s;opacity:0.55;user-select:none}
.cat-chip.active{opacity:1;transform:scale(1.05);box-shadow:0 0 12px 2px var(--cat-color,#6c8aff);font-weight:700}
.cat-chip:hover{opacity:0.85}
main{max-width:1100px;margin:0 auto;padding:0 24px 60px}
.timeline-year{font-size:1.3rem;font-weight:700;color:var(--text-muted);margin:36px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.timeline-year .yr-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0}
.pub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.pub-grid.list-view{grid-template-columns:1fr}
.pub-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s;cursor:default;animation:fadeIn .3s ease;position:relative;overflow:hidden}
.pub-card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.pub-type-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:12px 0 0 12px}
.pub-authors{font-size:0.78rem;color:var(--text-muted);margin-bottom:5px;line-height:1.5}
.ft-hl{color:#6c8aff;font-weight:600}
.pub-title{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.5}
.pub-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pub-tag{font-size:0.7rem;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--text-muted)}
.pub-journal{font-size:0.75rem;color:var(--text-muted);font-style:italic;margin-bottom:8px}
.pub-links{display:flex;gap:8px;flex-wrap:wrap}
.pub-link{font-size:0.72rem;padding:3px 10px;border-radius:10px;text-decoration:none;transition:all .2s;display:inline-block}
.pub-link.doi{background:rgba(108,138,255,.15);color:#6c8aff;border:1px solid rgba(108,138,255,.3)}
.pub-link.blog{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)}
.pub-link:hover{opacity:0.8;transform:scale(1.05)}
.no-results{text-align:center;padding:60px 20px;color:var(--text-muted);display:none}
.no-results.visible{display:block}
.view-toggle{display:flex;gap:6px}
.view-btn{background:var(--card);border:1px solid var(--border);color:var(--text-muted);padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:0.82rem;transition:all .2s}
.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#total-count{font-size:0.82rem;color:var(--text-muted);margin-left:auto;align-self:center}
#total-count strong{color:var(--accent)}
.footer-info{text-align:center;padding:40px 24px;color:var(--text-muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:40px}
.footer-info a{color:#6c8aff;text-decoration:none}
.footer-info .ut{color:#4caf50;font-size:0.75rem;margin-left:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
